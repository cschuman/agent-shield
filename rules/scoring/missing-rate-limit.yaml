schema_version: "1.0"
id: "scoring/missing-rate-limit"
category: missing_guardrail
severity: low
description: "Agent has no apparent rate limiting, allowing unbounded execution."
title: "No rate limiting detected"
remediation: "Add rate limiting to prevent runaway costs and denial-of-service scenarios."
when:
  context_signal:
    name: has_guardrail
    param: rate_limit
    op: eq
    value: false
score_adjustment: 5
compliance:
  nist_ai_rmf:   ["NIST AI RMF: MANAGE 3.1"]
  iso_42001:     ["ISO/IEC 42001"]
  eu_ai_act:     ["EU AI Act"]
  owasp_agentic: ["OWASP Agentic Top 10"]
extends: null
