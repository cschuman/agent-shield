schema_version: "1.0"
id: "scoring/missing-system-prompt"
category: prompt_injection_risk
severity: medium
description: "Agent has no detectable system prompt defining its role, boundaries, or behavioral constraints."
title: "No system prompt detected"
remediation: "Add an explicit system prompt that defines the agent's role, scope, and prohibited actions."
when:
  context_signal:
    name: has_system_prompt
    op: eq
    value: false
score_adjustment: 10
compliance:
  nist_ai_rmf:   ["NIST AI RMF: MAP 2.3, MEASURE 2.6"]
  iso_42001:     ["ISO/IEC 42001"]
  eu_ai_act:     ["EU AI Act"]
  owasp_agentic: ["OWASP Agentic: A05 Improper Output Handling"]
extends: null
